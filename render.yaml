services:
  - type: web
    name: fxguard-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fxguard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INTERSWITCH_CLIENT_ID
        sync: false
      - key: INTERSWITCH_CLIENT_SECRET
        sync: false
      - key: INTERSWITCH_MERCHANT_CODE
        sync: false
      - key: INTERSWITCH_PAYABLE_CODE
        sync: false
      - key: INTERSWITCH_BASE_URL
        value: https://sandbox.interswitchng.com
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health

databases:
  - name: fxguard-db
    databaseName: fxguard
    plan: free
