<html>
    <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
        <div style="background-color: #f8f9fa; padding: 20px; border-radius: 8px;">
            <h2 style="color: #333;">Email Verification</h2>
            <p style="color: #555; font-size: 16px;">
                Thank you for registering {company_greeting}! <br>
                Please use the following code to verify your email address:
            </p>
            
            <div style="background-color: #007bff; color: white; padding: 20px; border-radius: 8px; text-align: center; margin: 20px 0;">
                <p style="font-size: 32px; font-weight: bold; margin: 0;">{otp}</p>
            </div>
            
            <p style="color: #666; font-size: 14px;">
                This code will expire in 10 minutes. If you didn't request this email, please ignore it.
            </p>
            
            <hr style="border: none; border-top: 1px solid #dee2e6; margin: 20px 0;">
            
            <p style="color: #999; font-size: 12px;">
                © 2026 FXGuard. All rights reserved.
            </p>
        </div>
    </body>
</html>
