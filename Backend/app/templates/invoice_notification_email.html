<html>
    <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
        <div style="background-color: #f8f9fa; padding: 20px; border-radius: 8px;">
            <h2 style="color: #333;">Invoice Notification</h2>
            
            <p style="color: #555; font-size: 16px;">
                Hi {client_name},
            </p>
            
            <p style="color: #555; font-size: 16px;">
                We've created an invoice for you. Here are the details:
            </p>
            
            <div style="background-color: #ffffff; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; margin: 20px 0;">
                <p style="color: #666;"><strong>Invoice Number:</strong> {invoice_number}</p>
                <p style="color: #666;"><strong>Amount:</strong> {amount} {currency}</p>
                <p style="color: #666;"><strong>Due Date:</strong> {due_date}</p>
            </div>
            
            <p style="color: #555; font-size: 16px;">
                Please reach out if you have any questions.
            </p>
            
            <hr style="border: none; border-top: 1px solid #dee2e6; margin: 20px 0;">
            
            <p style="color: #999; font-size: 12px;">
                © 2026 FXGuard. All rights reserved.
            </p>
        </div>
    </body>
</html>
